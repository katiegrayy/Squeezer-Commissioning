# notes about darm channels: use cal delta L between runs until O3.  
# GDS-CALIB_STRAIN during O1 + O2
# 'H1:GDS-CALIB_STRAIN_CLEAN' during O3 and O4
# 3 June 2022 OAF-CLEAN_DELTAL_EXTERNAL_DQ became available and has better LSC + ASC noise than CAL-DELTAL most of the time

LHO_88039:     #  FC detuning at 3kHz
  nosqz: 1444059258
  FDS: 1446828330
  midsqz: 1446828830
  asqz: 1446829499
  span: 120
  darm_chan: 'H1:GDS-CALIB_STRAIN_CLEAN'
  budget_kwargs:
    # ── Interferometer ────────────────────────────────────────────────────────
    bname: 'Displacement'
    Parm: 360000                    # arm cavity power [W]
    sec_detuning_deg: 0             # signal recycling cavity detuning [deg]
    homodyne_angle_deg: 10          # homodyne readout angle [deg]
    readout_eff: 0.92               # total readout efficiency (OMC + homodyne)
    # ── Squeezer ──────────────────────────────────────────────────────────────
    sqz_config: 'Freq Dependent'    # squeezer type: 'None', 'Freq Independent', 'Freq Dependent'
    nlg: 16                         # nonlinear gain
    sqz_injection_loss: 0.073       # squeezer path injection loss
    sqz_angle_rms: 0.025            # RMS squeezing angle jitter [rad]
    # ── Filter Cavity ─────────────────────────────────────────────────────────
    fcdet_Hz: -3100                 # filter cavity detuning [Hz]
    fc_Tin: 0.000909                # filter cavity input mirror transmission
    fc_L: 297.55                    # filter cavity length [m]
    fc_Lrt: 50e-6                   # filter cavity round-trip loss
    fc_Lrms: 1.0e-12                # filter cavity length noise RMS [m]
    # ── Mode Mismatch ─────────────────────────────────────────────────────────
    include_mm: true
    MM_IFO_OMC: 0.0                 # IFO→OMC mismatch amplitude (power loss = MM²/2)
    MM_IFO_OMCphi: 0.0              # IFO→OMC mismatch phase [rad]
    MM_SQZ_OMC: 0.0                 # squeezer→OMC mismatch amplitude (power loss = MM²/2)
    MM_SQZ_OMCphi: 0.0              # squeezer→OMC mismatch phase [rad]
    FC_L_mm: 0.0                    # filter cavity length mismatch [m]
    FC_psi_mm: 0.0                  # filter cavity Gouy phase mismatch [rad]
    # ── Flags ─────────────────────────────────────────────────────────────────
    ifo_yaml_fname: 'QuantumParameters_July2025.yaml' 
    quiet: true
    use_default_gwinc_budgets: false


